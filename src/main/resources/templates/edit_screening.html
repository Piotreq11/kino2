<!DOCTYPE html>
<html lang="PL_pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edycja Seansu</title>
    <!-- Poprawna ścieżka DRY do CSS -->
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

    <h1>Modyfikacja Seansu</h1>
    <p>Wprowadź poprawki do wybranego wydarzenia kinowego.</p>

    <div class="container">
        <form th:action="@{/admin/seanse/edit/{id}(id=${screening.id})}" method="post">
            
            <div>
                <label>Numer sali:</label>
                <input type="number" name="numerSali" th:value="${screening.numerSali}" required min="1">
            </div>

            <div>
                <label>Data i godzina:</label>
                <input type="datetime-local" name="dataGodzinaStr" th:value="${screening.dataIGodzina}" required>
            </div>

            <div>
                <label>Przypisany film:</label>
                <select name="movieId" required>
                    <option th:each="film : ${movies}"
                            th:value="${film.id}"
                            th:text="${film.tytul}"
                            th:selected="${film.id == screening.movie.id}"></option>
                </select>
            </div>

            <div>
                <label>Cena biletu (zł):</label>
                <input type="number" step="0.01" name="cenaBiletu" th:value="${screening.cenaBiletu}" required min="0">
            </div>

            <button type="submit">Zapisz zmiany</button>
        </form>
    </div>

    <!-- Przycisk powrotu w spójnym stylu -->
    <a href="/admin/seanse" class="btn btn-back">❌ Anuluj i wróć</a>

</body>
</html>
