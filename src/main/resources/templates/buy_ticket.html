<!DOCTYPE html>
<html lang="PL_pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kup bilet</title>
    <!-- Poprawna ścieżka DRY do CSS -->
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

    <h1>Podsumowanie Wybranego Seansu</h1>
    <p>Sprawdź szczegóły filmu przed dokonaniem rezerwacji miejsca.</p>
    
    <!-- Wizytówka seansu -->
    <div class="container" style="margin-bottom: 25px; border-left: 5px solid #2ecc71;">
        <h3 style="margin-top: 0; font-size: 1.5em; color: #2c3e50;">
            Film: <span th:text="${screening.movie.tytul}"></span>
        </h3>
        <p style="text-align: left; margin: 5px 0;">🎬 Reżyser: <strong th:text="${screening.movie.director.imieNazwisko}"></strong></p>
        <p style="text-align: left; margin: 5px 0;">🚪 Sala kinowa: <strong th:text="${screening.numerSali}"></strong></p>
        <p style="text-align: left; margin: 5px 0;">📅 Data i godzina: <strong th:text="${#temporals.format(screening.dataIGodzina, 'dd.MM.yyyy HH:mm')}"></strong></p>
    </div>

    <!-- Komunikat o błędzie (np. zajęte miejsce) podpięty pod styl z arkusza -->
    <div th:if="${error}" class="error-box">
        ⚠️ <span th:text="${error}"></span>
    </div>

    <!-- Formularz zakupu biletów -->
    <div class="container">
        <h2>Dane do rezerwacji</h2>
        
        <form action="/bilety/kup" method="post">
            <!-- Ukryte pole przesyłające ID seansu -->
            <input type="hidden" name="screeningId" th:value="${screening.id}">

            <div>
                <label>Imię i Nazwisko widza:</label>
                <input type="text" name="imieNazwisko" required placeholder="np. Jan Kowalski">
            </div>

            <div>
                <label>Rodzaj biletu:</label>
                <select name="typBiletu" required>
                    <option value="NORMALNY">Normalny (100% ceny)</option>
                    <option value="ULGOWY">Ulgowy (-20% zniżki dla studentów/uczniów)</option>
                </select>
            </div>
            
            <div>
                <label>Numer miejsca na sali (1-100):</label>
                <input type="number" name="numerMiejsca" min="1" max="100" required placeholder="Wybierz krzesło...">
            </div>

            <div class="finance-box" style="background-color: #ebf8ff; border-color: #bee3f8; color: #2b6cb0; text-align: center;">
                Cena bazowa seansu: <span th:text="${#numbers.formatDecimal(screening.cenaBiletu, 1, 2, 'COMMA')}"></span> zł
            </div>

            <button type="submit" class="btn-buy" style="float: none; width: 100%; padding: 12px; border-radius: 6px;">
                🎟️ Potwierdzam zakup i rezerwację places
            </button>
        </form>
    </div>

    <!-- Link anulowania -->
    <a href="/repertuar" class="btn btn-back">← Rezygnuję, wróć do repertuaru</a>

</body>
</html>
