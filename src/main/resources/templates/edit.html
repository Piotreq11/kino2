<!DOCTYPE html>
<html lang="PL_pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edycja filmu</title>
</head>
<body>
<h1>Edycja filmu</h1>

<!-- Formularz wysyła dane na adres edycji tego konkretnego filmu -->
<form th:action="@{/edit/{id}(id=${movie.id})}" method="post">
    Tytuł:
    <input type="text" name="tytul" th:value="${movie.tytul}" required> <br>

    Czas trwania:
    <input type="number" name="czasTrwania" th:value="${movie.czasTrwania}" required> <br>

    <button type="submit">Zapisz zmiany</button>
</form>

<br>
<a href="/">Anuluj i wróć</a>
</body>
</html>
