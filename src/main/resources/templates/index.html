<!DOCTYPE html>
<html lang="PL_pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kino-Max | Strona Główna</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .dashboard {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
        }
        .container-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .card-button {
            flex: 1;
            padding: 30px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .client-btn {
            background-color: #2ecc71;
        }
        .client-btn:hover {
            background-color: #27ae60;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
        }
        .admin-btn {
            background-color: #34495e;
        }
        .admin-btn:hover {
            background-color: #2c3e50;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(52, 73, 94, 0.3);
        }
        .card-button span {
            display: block;
            font-size: 0.6em;
            font-weight: normal;
            margin-top: 10px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>System Zarządzania Kinem "Kino-Max"</h1>
        <p class="subtitle">Witaj! Wybierz panel, do którego chcesz przejść:</p>
        
        <div class="container-buttons">
            <!-- Przycisk dla Klienta -->
            <a href="/repertuar" class="card-button client-btn">
                Strefa Klienta
                <span>Przeglądaj repertuar i kup bilet</span>
            </a>
            
            <!-- Przycisk dla Admina -->
            <a href="/admin/seanse" class="card-button admin-btn">
                Panel Menedżera
                <span>Zarządzaj filmami i seansami</span>
            </a>
        </div>
    </div>

</body>
</html>
