<!DOCTYPE html>
<html lang="PL_pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kino - Seansy</title>
</head>
<body>

    <form action="/seanse/add" method="post">
        Numer sali: <input type="number" name="numerSali" id="numerSali" required> <br>
        Data i godzina: <input type="datetime-local" name="dataGodzinaStr" required> <br>
        Film: 
        <select name="movieId" required>
            <option th:each="film : ${movies}"
                    th:value="${film.id}"
                    th:text="${film.tytul}"></option>
        </select> <br>
        <button type="submit">Dodaj seans</button>
    </form>

    <div id="seanse">
        <h2>Seansy:</h2>
        <ul>
            <li th:each="screening : ${screenings}" style="margin-bottom: 20px;">
                <!-- Główne informacje o seansie -->
                <div>
                    Sala: <span th:text="${screening.numerSali}"></span> -
                    Data: <span th:text="${#temporals.format(screening.dataIGodzina, 'dd.MM.yyyy HH:mm')}"></span> -
                    Film: <strong th:text="${screening.movie.tytul}"></strong>
                    
                    <!-- Link do kupna biletu -->
                    <a th:href="@{/bilety/kup/{id}(id=${screening.id})}" style="font-weight: bold; color: green; margin-left: 10px;">
                        [ Kup bilet ]
                    </a>
                </div>

                <!-- Akcje managera (Usuń / Edytuj) -->
                <div style="margin-top: 5px;">
                    <form th:action="@{/seanse/delete/{id}(id=${screening.id})}" method="post" style="display:inline;">
                        <button type="submit">Usuń seans</button>
                    </form>
                    <a th:href="@{/seanse/edit/{id}(id=${screening.id})}" style="margin-left: 10px;">Edytuj seans</a>
                </div>

                <!-- Podgląd kupionych biletów -->
                <div style="margin-top: 10px; margin-left: 20px; font-size: 0.9em; color: #555;">
                    <strong>Sprzedane bilety:</strong>
                    <span th:if="${screening.bilety.isEmpty()}">Brak sprzedanych biletów.</span>

                    <ul th:if="${!screening.bilety.isEmpty()}">
                        <li th:each="bilet : ${screening.bilety}">
                            Miejsce <span th:text="${bilet.numerMiejsca}"></span>:
                            <span th:text="${bilet.imieNazwiskoKlienta}"></span>
                        </li>
                    </ul>
                </div>
                <hr>
            </li>
        </ul>
    </div>

    <br>
    <a href="/">Wróć do bazy filmów</a>
</body>
</html>
